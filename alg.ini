[alg]
# Example parameters
algorithm = logistic
# Either logistic or mine algorithm
image_type = mnist
# Image dataset to use. Real datasets: mnist, fashion_mnist, cifar10, lfw_faces.
# Gaussian Markov random fields: area, diffuse, sparse. Gaussian fit: gauss_mnist.
# (The original "tiny"/"gauss_tiny" Tiny Images sets have been removed.)
strength = small
# Strength of pixel correlation, if applicable
start_length = -27
# Starting length, if negative then resume when possible
num_images = 70000
# Number of images to train on
